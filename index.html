<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="d-flex justify-content-between mb-3 bg-light p-3">
      <div class="left"><h3>Kanban Board</h3></div>
      <div class="right">
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#taskModal"
        >
          Add new Task
        </button>
      </div>
    </nav>
    <div class="container">
      <div class="board gap-3 p-2 d-flex justify-content-between flex-grow-1">
        <div id="todo" class="column flex-fill border">
          <div
            class="heading p-2 d-flex justify-content-between align-items-center"
          >
            <div class="left">To Do</div>
            <div class="right">Count</div>
          </div>
        </div>
        <div id="inProgress" class="column flex-fill border">
          <div
            class="heading p-2 d-flex justify-content-between align-items-center"
          >
            <div class="left">In Progress</div>
            <div class="right">Count</div>
          </div>
        </div>
        <div id="completed" class="column flex-fill border">
          <div
            class="heading p-2 d-flex justify-content-between align-items-center"
          >
            <div class="left">Completed</div>
            <div class="right">Count</div>
          </div>
        </div>
      </div>

      <!-- Modal to add task -->
      <div class="modal fade" id="taskModal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header justify-content-center">
              <h3 class="modal-title">Add new Task</h3>
            </div>
            <div class="modal-body">
              <div class="field mb-3">
                <label for="newTask" class="form-label">Task Title</label>
                <input type="text" class="form-control" id="taskTitle" />
                <span class="text-danger" id="titleError"></span>
              </div>
              <div class="field mb-3">
                <label for="taskDesc" class="form-label"
                  >Task Description</label
                >
                <input type="text" class="form-control" id="taskDesc" />
                <span class="text-danger" id="descError"></span>
              </div>

              <div class="gap-2 d-flex justify-content-end">
                <button
                  class="btn btn-danger"
                  data-bs-dismiss="modal"
                  onclick="handleReset()"
                >
                  Cancel
                </button>
                <button class="btn btn-success" id="addNewTask">
                  Add Task
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
